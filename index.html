<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Presensi Digital - SMK Ekuintek Sukatani</title>
  
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- HTML5 QR Code Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --bg-dark: #0f0c1b;
      --card-bg: rgba(26, 20, 48, 0.75);
      --primary-purple: #7c3aed;
      --primary-gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      --accent-glow: rgba(168, 85, 247, 0.35);
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.18) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    /* Container Utama */
    .app-container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header & Identitas Sekolah */
    .header-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 20px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
    }

    .header-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .school-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.3);
      color: #d8b4fe;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .school-name {
      font-size: 1.35rem;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .app-subtitle {
      font-size: 0.85rem;
      color: var(--text-sub);
    }

    /* Card Jam Real-time */
    .time-card {
      background: rgba(26, 20, 48, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }

    .time-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time-icon {
      width: 38px;
      height: 38px;
      background: var(--primary-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
    }

    .clock-display {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .date-display {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    /* Frame Scanner Camera */
    .scanner-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 24px;
      padding: 16px;
      position: relative;
      box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.6);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #reader {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: none !important;
      background: #000;
    }

    #reader video {
      object-fit: cover !important;
      border-radius: 16px;
      width: 100% !important;
    }

    /* Card Response Status */
    .result-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-standby {
      color: var(--text-sub);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-success {
      color: var(--success);
      font-weight: 600;
      animation: popIn 0.3s ease;
    }

    .status-error {
      color: var(--error);
      font-weight: 600;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .footer-text {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-sub);
      margin-top: 8px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Header Identitas -->
    <div class="header-card">
      <div class="school-badge">
        <i class="fa-solid fa-graduation-cap"></i> Sistem Absensi QR
      </div>
      <h1 class="school-name">SMK Ekuintek Sukatani</h1>
      <p class="app-subtitle">Arahkan QR Code Guru ke Kamera</p>
    </div>

    <!-- Jam Real-time -->
    <div class="time-card">
      <div class="time-info">
        <div class="time-icon">
          <i class="fa-regular fa-clock"></i>
        </div>
        <div>
          <div class="clock-display" id="clock">00:00:00 WIB</div>
          <div class="date-display" id="date">Hari, Tanggal Bulan Tahun</div>
        </div>
      </div>
    </div>

    <!-- Frame Scanner -->
    <div class="scanner-card">
      <div id="reader"></div>
    </div>

    <!-- Tampilan Status Result -->
    <div class="result-card" id="result-box">
      <div class="status-standby" id="status-text">
        <i class="fa-solid fa-qrcode"></i> Siap memindai barcode...
      </div>
    </div>

    <div class="footer-text">
      &copy; Presensi Digital SMK Ekuintek Sukatani
    </div>

  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3bQP5nkZyVnesXbCd1p6zplwptdsFQXtISumfuP8f8amPVW_o2iYvzXEkEsFF5Tf3/exec";

    // Jam Real-Time
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds} WIB`;

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date').innerText = now.toLocaleDateString('id-ID', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Sistem QR Code Scanner khusus Multi-Kamera
    let isProcessing = false;
    const resultBox = document.getElementById('result-box');
    const html5QrCode = new Html5Qrcode("reader");

    function onScanSuccess(qrCodeMessage) {
      if (isProcessing) return;
      isProcessing = true;

      playBeep();

      resultBox.innerHTML = `
        <div style="color: #a855f7; font-weight: 600;">
          <i class="fa-solid fa-spinner fa-spin"></i> Memproses data absensi...
        </div>
      `;

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ qr_id: qrCodeMessage })
      })
      .then(() => {
        resultBox.innerHTML = `
          <div class="status-success">
            <i class="fa-solid fa-circle-check" style="font-size: 1.2rem;"></i><br>
            Absen Berhasil Dicatat!
          </div>
        `;
        resetScannerWithDelay();
      })
      .catch(error => {
        resultBox.innerHTML = `
          <div class="status-error">
            <i class="fa-solid fa-circle-xmark"></i> Gagal terhubung ke server!
          </div>
        `;
        resetScannerWithDelay();
      });
    }

    function resetScannerWithDelay() {
      setTimeout(() => {
        resultBox.innerHTML = `
          <div class="status-standby">
            <i class="fa-solid fa-qrcode"></i> Siap memindai barcode berikutnya...
          </div>
        `;
        isProcessing = false;
      }, 3500);
    }

    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      } catch(e) {}
    }

    // PAKSA MENGGUNAKAN KAMERA BELAKANG UTAMA
    const config = { fps: 10, qrbox: { width: 220, height: 220 } };
    
    html5QrCode.start(
      { facingMode: "environment" }, 
      config, 
      onScanSuccess
    ).catch(err => {
      console.error("Gagal membuka kamera otomatis:", err);
      resultBox.innerHTML = `
        <div class="status-error">
          <i class="fa-solid fa-triangle-exclamation"></i> Klik 'Izinkan Kamera' di browser HP Anda.
        </div>
      `;
    });
  </script>
</body>
</html>
